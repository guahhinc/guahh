function renderSearchUI(skipOSK) {
  appContent.innerHTML = '<div class="internal-ui"><h1>Search Anywhere</h1><input type="text" id="global-search-input" placeholder="Type to search apps, content..." autocomplete="off" readonly><div id="search-results-container" style="display:flex;flex-direction:column;gap:15px"></div></div>';
  setTimeout(function() { 
      var inp = document.getElementById('global-search-input'); 
      if (inp) { 
          inp.addEventListener('input', updateSearchResults); 
          inp.addEventListener('click', function() { 
              if (!oskOpen) openOSK(inp); 
          }); 
          if (!skipOSK) openOSK(inp); 
      } 
  }, 50);
}

function updateSearchResults() {
  var inp = document.getElementById('global-search-input'); 
  if (!inp) return;
  
  var query = inp.value.toLowerCase(); 
  var container = document.getElementById('search-results-container');
  
  if (!query) { 
      container.innerHTML = ''; 
      searchFocusIdx = -1; 
      return; 
  }
  
  var results = [];
  
  appDatabase.forEach(function(app) { 
      if (app && app.label.toLowerCase().includes(query) && app.id !== 'resume_watching') {
          results.push({ type:'app', label:'App: ' + app.label, id: app.id }); 
      }
  });
  
  registry.forEach(function(item) { 
      if (item && (item.title.toLowerCase().includes(query) || (item.artist || '').toLowerCase().includes(query))) {
          results.push({ type:'content', label: item.app + ': ' + item.title, item: item }); 
      }
  });
  
  var h = results.length === 0 ? '<div style="font-size:20px;color:rgba(255,255,255,0.5);padding:20px">No results found</div>' : results.map(function(r, i){ return '<button class="setting-btn search-result-btn" style="margin-bottom:0" data-index="' + i + '" data-type="' + r.type + '">' + r.label + '<div class="card-shine"></div></button>'; }).join('');
  
  container.innerHTML = h; 
  container._results = results; 
  bindSprings('.search-result-btn'); 
  
  container.querySelectorAll('.search-result-btn').forEach(function(btn, idx) {
      btn.addEventListener('click', function() {
          searchFocusIdx = idx;
          triggerSearchAction();
      });
  });
  
  searchFocusIdx = results.length > 0 ? 0 : -1; 
  updateSearchFocus();
}

function updateSearchFocus(dir) { 
    applyFocus(document.querySelectorAll('.search-result-btn'), searchFocusIdx, dir); 
}

function triggerSearchAction() {
  var container = document.getElementById('search-results-container'); 
  var results = container && container._results;
  
  if (!results || searchFocusIdx < 0 || searchFocusIdx >= results.length) return;
  
  var r = results[searchFocusIdx];
  if (r.type === 'app') { 
      if (oskOpen) closeOSK(false);
      if (lightboxOpen) closeLightbox(); 
      if (videoPlayerOpen) closeVideoPlayer(); 
      if (audioPlayerOpen) closeAudioPlayer();
      forceCloseApp();
      syncFocusToId(r.id); 
      openApp(true);
  } else if (r.type === 'content') { 
      if (oskOpen) closeOSK(false);
      openAppForItem(r.item);
  }
}

/* ══════ SPRING FOCUS HELPERS ══════ */
function bindSprings(selector) {
  internalUIItems = []; 
  var query = '.vid-btn,.aud-btn'; 
  if (selector) query = selector + ',' + query;
  
  document.querySelectorAll(query).forEach(function(el) {
    if (!el.springs) {
        el.springs = { 
            scale: new Spring(1.0, 0.28, 0.55), 
            posX: new Spring(0, 0.28, 0.55), 
            posY: new Spring(0, 0.28, 0.55) 
        };
    }
    el.needsInitRender = true; 
    internalUIItems.push(el);
  });
}

function applyFocus(btns, index, dir, noScroll) {
  btns.forEach(function(btn, i) {
    var focused = (i === index); 
    var s = btn.springs;
    
    if (s) {
      var tgt = (btn.classList.contains('vid-btn') || btn.classList.contains('aud-btn')) ? 1.12 : 1.04;
      s.scale.target = focused ? tgt : 1.0;
      
      if (!focused) {
        s.posX.target = 0;
        s.posY.target = 0;
      }
      
      if (focused && !btn.classList.contains('focused') && dir) {
        if (dir === 'up') s.posY.vel = -8; 
        if (dir === 'down') s.posY.vel = 8;
        if (dir === 'left') s.posX.vel = -8; 
        if (dir === 'right') s.posX.vel = 8;
      }
    }
    
    btn.classList.toggle('focused', focused);
    
    if (focused && !noScroll) {
      if (typeof btn.scrollIntoView === 'function') {
        try {
          btn.scrollIntoView({ behavior:'smooth', block:'center' });
        } catch (e) {
          btn.scrollIntoView();
        }
      }
    }
  });
}

function updateVideoFocus(dir) { 
    applyFocus(document.querySelectorAll('.vid-btn'), videoFocusIdx, dir, true); 
}
function updateAudioFocus(dir) { 
    applyFocus(document.querySelectorAll('.aud-btn'), audioFocusIdx, dir, true); 
}

function findIndexByAction(items, action) {
  for (var idx = 0; idx < items.length; idx++) {
    if (items[idx].dataset.action === action) return idx;
  }
  return -1;
}

/* ══════ NAVIGATION ══════ */
function handleNavigation(dir) {
  if (appMode === 'SYSTEM_DIALOG') {
    var btns = document.querySelectorAll('.dialog-btn');
    if (dir === 'up' && dialogFocusIdx > 0) {
      dialogFocusIdx--;
      updateDialogFocus(dir);
    }
    if (dir === 'down' && dialogFocusIdx < btns.length - 1) {
      dialogFocusIdx++;
      updateDialogFocus(dir);
    }
    return;
  }

  if (appMode === 'CONTROL_CENTER') {
    var visibleItems = getVisibleCCItems();
    var currentItem = visibleItems[ccFocusIdx];
    if (!currentItem) return;
    
    var action = currentItem.dataset.action;
    var nextIdx = ccFocusIdx;

    if (action === 'volume' && (dir === 'left' || dir === 'right')) {
      if (dir === 'left') setGlobalVolume(globalVolume - 0.1);
      if (dir === 'right') setGlobalVolume(globalVolume + 0.1);
      return;
    }

    if (dir === 'up') {
      if (action === 'home' || action === 'search') {
        nextIdx = findIndexByAction(visibleItems, 'sleep');
      } else if (action === 'sleep') {
        nextIdx = findIndexByAction(visibleItems, 'screensaver');
      } else if (action === 'screensaver') {
        nextIdx = findIndexByAction(visibleItems, 'volume');
      }
    }
    else if (dir === 'down') {
      if (action === 'volume') {
        nextIdx = findIndexByAction(visibleItems, 'screensaver');
      } else if (action === 'screensaver') {
        nextIdx = findIndexByAction(visibleItems, 'sleep');
      } else if (action === 'sleep') {
        nextIdx = findIndexByAction(visibleItems, 'home');
      }
    }
    else if (dir === 'left') {
      if (action === 'search') {
        nextIdx = findIndexByAction(visibleItems, 'home');
      }
    }
    else if (dir === 'right') {
      if (action === 'home') {
        nextIdx = findIndexByAction(visibleItems, 'search');
      }
    }

    if (nextIdx !== -1 && nextIdx !== ccFocusIdx) {
      ccFocusIdx = nextIdx;
      updateCCFocus(dir);
    }
    return;
  }
  
  if (oskOpen) { 
      navigateOSK(dir); 
      return; 
  }
  
  if (lightboxOpen) return;
  
  if (videoPlayerOpen) {
    showVideoControls(); 
    var vmax = document.querySelectorAll('.vid-btn').length - 1;
    
    if (dir === 'left'  && videoFocusIdx > 0) { 
        videoFocusIdx--; 
        updateVideoFocus('left'); 
    }
    if (dir === 'right' && videoFocusIdx < vmax) { 
        videoFocusIdx++; 
        updateVideoFocus('right'); 
    }
    return;
  }
  
  if (audioPlayerOpen) {
    var amax = document.querySelectorAll('.aud-btn').length - 1;
    if (dir === 'left'  && audioFocusIdx > 0) { 
        audioFocusIdx--; 
        updateAudioFocus('left'); 
    }
    if (dir === 'right' && audioFocusIdx < amax) { 
        audioFocusIdx++; 
        updateAudioFocus('right'); 
    }
    return;
  }
  
  if (appMode === 'SETTINGS') {
    var smax = document.querySelectorAll('.setting-btn').length - 1;
    
    if (dir === 'up' && settingsFocusIdx > 0) { 
        settingsFocusIdx--; 
        updateSettingsFocus('up'); 
    }
    if (dir === 'down' && settingsFocusIdx < smax) { 
        settingsFocusIdx++; 
        updateSettingsFocus('down'); 
    }
    if (dir === 'left' || dir === 'right') {
        var btn = document.querySelectorAll('.setting-btn')[settingsFocusIdx];
        if (btn && btn.dataset.action === 'volume') { 
            if (dir === 'left') setGlobalVolume(globalVolume - 0.1); 
            if (dir === 'right') setGlobalVolume(globalVolume + 0.1); 
        }
    }
  } 
  else if (appMode === 'MEDIA_LIST') {
    var mmax = document.querySelectorAll('.media-item-btn').length - 1;
    var isGrid = (currentMediaApp === 'movies' || currentMediaApp === 'tvshows' || currentMediaApp === 'sports');
    
    if (isGrid) {
      var cols = 4;
      if (dir === 'left' && mediaFocusIdx > 0 && (mediaFocusIdx % cols !== 0)) { 
          mediaFocusIdx--; 
          updateMediaFocus('left'); 
      }
      if (dir === 'right' && mmax >= mediaFocusIdx && ((mediaFocusIdx + 1) % cols !== 0)) { 
          mediaFocusIdx++; 
          updateMediaFocus('right'); 
      }
      if (dir === 'up' && mediaFocusIdx >= cols) { 
          mediaFocusIdx -= cols; 
          updateMediaFocus('up'); 
      }
      if (dir === 'down' && mediaFocusIdx + cols <= mmax) { 
          mediaFocusIdx += cols; 
          updateMediaFocus('down'); 
      }
    } else {
      if (dir === 'up' && mediaFocusIdx > 0) { 
          mediaFocusIdx--; 
          updateMediaFocus('up'); 
      }
      if (dir === 'down' && mediaFocusIdx < mmax) { 
          mediaFocusIdx += 1; 
          updateMediaFocus('down'); 
      }
    }
  } 
  else if (appMode === 'SEARCH') {
    var inp = document.getElementById('global-search-input'); 
    var rmax = document.querySelectorAll('.search-result-btn').length - 1;
    
    if (dir === 'up') { 
        if (searchFocusIdx > 0) { 
            searchFocusIdx--; 
            updateSearchFocus('up'); 
        } else if (inp && !oskOpen) {
            openOSK(inp); 
        }
    }
    if (dir === 'down' && searchFocusIdx < rmax) { 
        searchFocusIdx++; 
        updateSearchFocus('down'); 
    }
  } 
  else if (appMode === 'PHOTOS') {
    var pitems = document.querySelectorAll('.photo-grid-item'); 
    var cols = Math.max(1, Math.floor(1400 / 380));
    
    if (dir === 'left' && photoFocusIdx > 0) { 
        photoFocusIdx--; 
        updatePhotoFocus('left'); 
    }
    if (dir === 'right' && photoFocusIdx < pitems.length - 1) { 
        photoFocusIdx++; 
        updatePhotoFocus('right'); 
    }
    if (dir === 'up' && photoFocusIdx >= cols) { 
        photoFocusIdx -= cols; 
        updatePhotoFocus('up'); 
    }
    if (dir === 'down' && photoFocusIdx + cols < pitems.length) { 
        photoFocusIdx += cols; 
        updatePhotoFocus('down'); 
    }
  } 
  else if (appMode === 'NONE') {
    var r = activeRow;
    var c = activeCol;
    var dx = 0;
    var dy = 0;
    
    if (dir === 'right') { 
        c++; 
        dx = 1; 
        if (c >= grid[r].length) c = grid[r].length - 1; 
    }
    if (dir === 'left') { 
        c--; 
        dx = -1; 
        if (c < 0) c = 0; 
    }
    if (dir === 'down' && r < grid.length - 1) { 
        r++; 
        dy = 1; 
        c = Math.min(c, grid[r].length - 1); 
    }
    if (dir === 'up' && r > 0) { 
        if (r === 1 && (!grid[0] || grid[0].length === 0)) {
            // Cannot go up to an empty shelf
        } else {
            r--; 
            dy = -1; 
            c = Math.min(c, grid[r].length - 1); 
        }
    }
    
    if (r !== activeRow || c !== activeCol) {
        setFocus(r, c, dx, dy);
    }
  }
}

function handleEnter() {
  if (appMode === 'SYSTEM_DIALOG') {
      var btns = document.querySelectorAll('.dialog-btn');
      if (btns[dialogFocusIdx]) btns[dialogFocusIdx].click();
      return;
  }
  if (appMode === 'CONTROL_CENTER') { 
      triggerCCAction(); 
      return; 
  }
  if (oskOpen) { 
      pressOSKFocused(); 
      return; 
  }
  if (lightboxOpen) { 
      closeLightbox(); 
      return; 
  }
  if (videoPlayerOpen) { 
      var vb = document.querySelectorAll('.vid-btn'); 
      if (vb[videoFocusIdx]) vb[videoFocusIdx].click(); 
      return; 
  }
  if (audioPlayerOpen) { 
      var ab = document.querySelectorAll('.aud-btn'); 
      if (ab[audioFocusIdx]) ab[audioFocusIdx].click(); 
      return; 
  }
  
  if (appMode === 'NONE') {
      openApp(false);
  } else if (appMode === 'SETTINGS') {
      triggerSettingsAction();
  } else if (appMode === 'MEDIA_LIST') {
      triggerMediaAction();
  } else if (appMode === 'SEARCH') { 
      if (searchFocusIdx >= 0) {
          triggerSearchAction(); 
      } else { 
          var inp = document.getElementById('global-search-input'); 
          if (inp && !oskOpen) openOSK(inp); 
      } 
  } else if (appMode === 'PHOTOS') { 
      if (photoItems[photoFocusIdx]) openLightbox(photoItems[photoFocusIdx]); 
  }
}

document.addEventListener('keydown', function(e) {
  var bo = document.getElementById('boot-overlay');
  if (bo && !bo.classList.contains('hidden') && (e.key === 'x' || e.key === 'X')) {
      window.location.href = 'recovery.html';
      return;
  }

  var isBypass = (screensaverActive && (e.key === 'y' || e.key === 'Y'));
  var wasInactive = (isSleeping || (screensaverActive && !isBypass));
  resetIdle(isBypass); 
  
  if (isBypass) {
    e.preventDefault();
    e.stopPropagation();
    toggleScreensaverClock();
    return;
  }
  
  if (wasInactive) { 
      e.preventDefault(); 
      e.stopPropagation(); 
      return; 
  }
  
  if (Date.now() - wakeLockTime < 300) { 
      e.preventDefault(); 
      e.stopPropagation(); 
      return; 
  }

  // Assistant key listener override
  if ((e.key === 'y' || e.key === 'Y') && !oskOpen && !screensaverActive && appMode !== 'CONTROL_CENTER' && !isSleeping) {
      if (appEnabledState.guahh_assistant === false) return;
      e.preventDefault();
      if (!yKeyTriggered) {
          if (yKeyDownTime === 0) {
              yKeyDownTime = Date.now();
              setTimeout(function() {
                  if (yKeyDownTime !== 0 && !yKeyTriggered) {
                      yKeyTriggered = true;
                      openAssistant();
                  }
              }, 100);
          }
      }
      return;
  }

  var nav = ['ArrowRight','ArrowLeft','ArrowUp','ArrowDown'];
  if (nav.indexOf(e.key) !== -1) {
      e.preventDefault();
      if (!keysDown[e.key]) {
          keysDown[e.key] = { time: Date.now(), lastRepeat: 0 };
          handleNavigation(e.key.replace('Arrow', '').toLowerCase());
      }
      return;
  }
  
  if (e.key === 'Enter') {
      e.preventDefault();
      handleEnter();
      return;
  }

  if (e.key === 'Escape') { 
      e.preventDefault();
      if (appMode === 'SYSTEM_DIALOG') {
          closeSystemDialog();
          return;
      }
      if (oskOpen) {
          closeOSK(false);
          return;
      }
      if (!escHeld) { 
          escHeld = true; 
          escPressTime = Date.now(); 
          escTriggered = false; 
      } 
      return; 
  }
  
  if (oskOpen) {
    if (e.key === 'Backspace') { 
        e.preventDefault(); 
        oskPressKey('BKSP'); 
    }
    else if (e.key.length === 1) {
      oskValue += e.key; 
      document.getElementById('osk-text').textContent = oskValue.replace(/\n/g, ' ↵ ');
      var displayEl = document.getElementById('osk-display');
      
      if (displayEl) {
          displayEl.scrollLeft = displayEl.scrollWidth;
      }
      
      if (oskTarget) { 
          oskTarget.value = oskValue; 
          oskTarget.dispatchEvent(new Event('input')); 
      }
      updateSuggestions();
    }
  }
});

document.addEventListener('keyup', function(e) {
  if (Date.now() - wakeLockTime < 300) return;

  if (keysDown[e.key]) {
      delete keysDown[e.key];
  }

  if (e.key === 'y' || e.key === 'Y') {
      yKeyDownTime = 0;
      yKeyTriggered = false;
  }
  
  if (e.key === 'Escape') {
    escHeld = false;
    if (!escTriggered) {
        if (appMode === 'SYSTEM_DIALOG') {
            closeSystemDialog();
        } else if (appMode === 'CONTROL_CENTER') { 
            toggleControlCenter(); 
        } else if (!oskOpen) { 
            closeApp(); 
        } 
    }
    escTriggered = false;
  }
});

/* Gamepad Flat Axis Movements */
function pollGamepad() {
  var pads = [];
  try {
    pads = navigator.getGamepads ? navigator.getGamepads() : [];
  } catch(e) {}
  
  if (!pads) pads = [];
  var gp = null;
  
  for (var i = 0; i < pads.length; i++) { 
      if (pads[i]) { 
          gp = pads[i]; 
          break; 
      } 
  }
  
  if (!gp) return;

  var th = 0.75; 
  var up = (gp.buttons[12] && gp.buttons[12].pressed) || (gp.axes[1] < -th);
  var down = (gp.buttons[13] && gp.buttons[13].pressed) || (gp.axes[1] > th);
  var left = (gp.buttons[14] && gp.buttons[14].pressed) || (gp.axes[0] < -th);
  var right = (gp.buttons[15] && gp.buttons[15].pressed) || (gp.axes[0] > th);
  var a = gp.buttons[0] && gp.buttons[0].pressed;
  var bPressed = gp.buttons[1] && gp.buttons[1].pressed;
  var xPressed = gp.buttons[2] && gp.buttons[2].pressed;
  var yPressed = gp.buttons[3] && gp.buttons[3].pressed;

  var bo = document.getElementById('boot-overlay');
  if (bo && !bo.classList.contains('hidden') && xPressed) {
      window.location.href = 'recovery.html';
      return;
  }
  
  if (screensaverActive && yPressed) {
    if (!lastGP.y) {
      toggleScreensaverClock();
    }
    idleTime = 0; 
    lastGP = { up: up, down: down, left: left, right: right, a: a, bPressed: bPressed, bPressTime: lastGP.bPressTime || 0, bTriggered: lastGP.bTriggered || false, x: xPressed, y: yPressed, yPressTime: lastGP.yPressTime || 0, yTriggered: lastGP.yTriggered || false };
    return;
  }
  
  var inputActive = up || down || left || right || a || bPressed || xPressed || yPressed;
  
  if (inputActive) {
     var wasInactive = (isSleeping || screensaverActive);
     resetIdle(false);
     if (wasInactive) {
         lastGP = { up: up, down: down, left: left, right: right, a: a, bPressed: bPressed, bPressTime: lastGP.bPressTime || 0, bTriggered: lastGP.bTriggered || false, x: xPressed, y: yPressed, yPressTime: lastGP.yPressTime || 0, yTriggered: lastGP.yTriggered || false };
         return; 
     }
  }

  if (Date.now() - wakeLockTime < 300) {
      lastGP = { up: up, down: down, left: left, right: right, a: a, bPressed: bPressed, bPressTime: lastGP.bPressTime || 0, bTriggered: lastGP.bTriggered || false, x: xPressed, y: yPressed, yPressTime: lastGP.yPressTime || 0, yTriggered: lastGP.yTriggered || false };
      return; 
  }

  /* Micro movements calculations - Flat Offset on Left Stick Tilt (Increased response scale) */
  var deadzone = 0.05;
  var jX = Math.abs(gp.axes[0]) > deadzone ? gp.axes[0] : 0;
  var jY = Math.abs(gp.axes[1]) > deadzone ? gp.axes[1] : 0;
  
  if (oskOpen) {
    oskUIItems.forEach(function(item) {
      var btn = item.el;
      var focused = (item.row === oskRow && item.col === oskCol);
      if (focused && btn.springs) {
        btn.springs.posX.target = jX * 24; 
        btn.springs.posY.target = jY * 24;
      } else if (btn.springs) {
        btn.springs.posX.target = 0;
        btn.springs.posY.target = 0;
      }
    });
  } else if (appMode === 'SYSTEM_DIALOG') {
    var visibleItems = document.querySelectorAll('.dialog-btn');
    var activeBtn = visibleItems[dialogFocusIdx];
    if (activeBtn && activeBtn.springs) {
      activeBtn.springs.posX.target = jX * 20; // FIXED: Replaced invalid reference btn -> activeBtn
      activeBtn.springs.posY.target = jY * 20;
    }
  } else if (appMode === 'NONE' && !videoPlayerOpen && !audioPlayerOpen) {
    var activeItem = grid[activeRow] ? grid[activeRow][activeCol] : null;
    if (activeItem && activeItem.springs) {
      activeItem.springs.posX.target = jX * 36; 
      activeItem.springs.posY.target = jY * 36;
    }
  } else if (appMode === 'CONTROL_CENTER') {
    var visibleItems = getVisibleCCItems();
    var activeBtn = visibleItems[ccFocusIdx];
    if (activeBtn && activeBtn.springs) {
      activeBtn.springs.posX.target = jX * 20; 
      activeBtn.springs.posY.target = jY * 20;
    }
  } else {
    internalUIItems.forEach(function(el) {
      if (el && el.classList && el.classList.contains('focused') && el.springs) {
        el.springs.posX.target = jX * 20; 
        el.springs.posY.target = jY * 20;
      }
    });
  }

  // Continuous hold support for joystick D-pad navigation
  var curDir = null;
  if (up) curDir = 'up';
  else if (down) curDir = 'down';
  else if (left) curDir = 'left';
  else if (right) curDir = 'right';

  if (curDir) {
    var now = Date.now();
    if (gpRepeat.dir !== curDir) {
      gpRepeat.dir = curDir;
      gpRepeat.startTime = now;
      gpRepeat.lastTime = now;
      handleNavigation(curDir);
    } else {
      var heldTime = now - gpRepeat.startTime;
      if (heldTime > 200) { 
        if (now - gpRepeat.lastTime > 80) { 
          handleNavigation(curDir);
          gpRepeat.lastTime = now;
        }
      }
    }
  } else {
    gpRepeat.dir = null;
  }
  
  if (a && !lastGP.a) handleEnter();
  
  if (bPressed) {
    if (!lastGP.bPressed) { 
        lastGP.bPressTime = Date.now(); 
        lastGP.bTriggered = false; 
    } else { 
        if (!lastGP.bTriggered && (Date.now() - lastGP.bPressTime > 400)) { 
            lastGP.bTriggered = true; 
            toggleControlCenter(); 
        } 
    }
  } else {
    if (lastGP.bPressed) { 
        if (!lastGP.bTriggered) { 
            if (appMode === 'SYSTEM_DIALOG') {
                closeSystemDialog();
            } else if (oskOpen) {
                closeOSK(false);
            } else if (appMode === 'CONTROL_CENTER') { 
                toggleControlCenter(); 
            } else { 
                closeApp(); 
            } 
        } 
    }
  }
  
  if (xPressed && !lastGP.x) { if (oskOpen) oskPressKey('BKSP'); }
  
  // Gamepad Y button Assistant Handling
  if (yPressed) {
      if (!lastGP.y) {
          if (oskOpen) {
              oskPressKey('SPACE');
              lastGP.yTriggered = true; 
          } else {
              lastGP.yPressTime = Date.now();
              lastGP.yTriggered = false;
          }
      } else if (!oskOpen && !lastGP.yTriggered && (Date.now() - lastGP.yPressTime >= 100)) {
          lastGP.yTriggered = true;
          if (appEnabledState.guahh_assistant !== false) openAssistant();
      }
  } else {
      lastGP.yTriggered = false;
  }
  
  lastGP = { 
      up: up, 
      down: down, 
      left: left, 
      right: right, 
      a: a, 
      bPressed: bPressed, 
      bPressTime: lastGP.bPressTime || 0, 
      bTriggered: lastGP.bTriggered || false, 
      x: xPressed, 
      y: yPressed,
      yPressTime: lastGP.yPressTime || 0,
      yTriggered: lastGP.yTriggered || false
  };
}

/* ══════ RENDER LOOP ══════ */
function render() {
  pollGamepad();
  
  var nowTime = Date.now();
  for (var k in keysDown) {
      var kb = keysDown[k];
      if (nowTime - kb.time > 200) {
          if (nowTime - kb.lastRepeat > 80) {
              handleNavigation(k.replace('Arrow', '').toLowerCase());
              kb.lastRepeat = nowTime;
          }
      }
  }

  if (escHeld && !escTriggered) { 
      if (Date.now() - escPressTime > 400) { 
          escTriggered = true; 
          toggleControlCenter(); 
      } 
  }

  // Process Isolation - Skip updating home grid springs when an application is active
  var updateHomeGrid = (appMode === 'NONE' || appMode === 'CONTROL_CENTER') && !videoPlayerOpen && !audioPlayerOpen;
  if (updateHomeGrid) {
    var idleX = Math.sin(nowTime * 0.001) * 3; 
    var idleY = Math.cos(nowTime * 0.001) * 3;

    for (var r = 0; r < grid.length; r++) {
      for (var c = 0; c < grid[r].length; c++) {
        var item = grid[r][c];
        var s = item.springs;
        var changed = item.needsInitRender || false;
        item.needsInitRender = false;

        if (s.scale.update()) changed = true;
        if (s.posX.update()) changed = true;
        if (s.posY.update()) changed = true;
        if (s.focusState.update()) changed = true;

        if (!changed) continue; 
        
        var cardMoveScale = 0.48;
        var posX_px = (s.posX.val * cardMoveScale).toFixed(2);
        var posY_px = (s.posY.val * cardMoveScale).toFixed(2);
        
        item.card.style.transform = 'translate3d(' + posX_px + 'px,' + posY_px + 'px,0) scale(' + s.scale.val.toFixed(3) + ')';
        var f = Math.max(0, s.focusState.val);
        
        if (item.shadowFocus) {
            item.shadowFocus.style.opacity = f.toFixed(3);
        }

        if (item.glassBorder) {
            var baseOpacity = 0.1; 
            var selectedOpacity = 0.4;
            item.glassBorder.style.opacity = (baseOpacity + (selectedOpacity - baseOpacity) * f).toFixed(3);
        }

        if (item.shine) {
            item.shine.style.opacity = f.toFixed(3);
            // Dynamic travel radius constrained and elevated vertically
            var shineX = 50 + (s.posX.val * 1.5) + (idleX * 0.5); 
            var shineY = 15 + (s.posY.val * 1.5) + (idleY * 0.5);
            // Slightly reduced highlight opacity
            item.shine.style.background = 'radial-gradient(circle at ' + shineX.toFixed(1) + '% ' + shineY.toFixed(1) + '%, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0) 100%)';
        }
      }
    }
  }

  // Decoupled App Viewports - Limit calculations strictly to active interfaces
  var updateInternalUI = (appMode !== 'NONE' || videoPlayerOpen || audioPlayerOpen || appMode === 'SYSTEM_DIALOG');
  if (updateInternalUI) {
    for (var i = 0; i < internalUIItems.length; i++) {
      var el = internalUIItems[i];
      if (!el || !el.isConnected) continue;
      
      var s = el.springs; 
      var changed = el.needsInitRender !== false;
      el.needsInitRender = false;
      
      if (s.scale.update()) changed = true;
      if (s.posX.update()) changed = true;
      if (s.posY.update()) changed = true;
      
      if (changed) {
        var uiMoveScale = 0.5;
        var uiX = (s.posX.val * uiMoveScale).toFixed(2);
        var uiY = (s.posY.val * uiMoveScale).toFixed(2);
        el.style.transform = 'translate3d(' + uiX + 'px,' + uiY + 'px,0) scale(' + s.scale.val.toFixed(3) + ')';
        
        // Update elevated shine positions dynamically for internal focused elements
        var shineEl = el.querySelector('.card-shine');
        if (shineEl) {
          var isFocused = el.classList.contains('focused');
          shineEl.style.opacity = isFocused ? '1' : '0';
          if (isFocused) {
            var sX = 50 + (s.posX.val * 1.5);
            var sY = 15 + (s.posY.val * 1.5);
            shineEl.style.background = 'radial-gradient(circle at ' + sX.toFixed(1) + '% ' + sY.toFixed(1) + '%, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0) 100%)';
          }
        }
      }
    }
  }
  
  if (oskOpen) {
    for (var i = 0; i < oskUIItems.length; i++) {
      var item = oskUIItems[i];
      if (!item) continue;
      
      var el = item.el;
      var s = el.springs;
      var changed = el.needsInitRender !== false;
      el.needsInitRender = false;
      
      if (s.scale.update()) changed = true;
      if (s.posX.update()) changed = true;
      if (s.posY.update()) changed = true;
      
      if (changed) {
        var oskMoveScale = 0.5;
        var oskX = (s.posX.val * oskMoveScale).toFixed(2);
        var oskY = (s.posY.val * oskMoveScale).toFixed(2);
        el.style.transform = 'translate3d(' + oskX + 'px,' + oskY + 'px,0) scale(' + s.scale.val.toFixed(3) + ')';
      }
    }
  }
  
  requestAnimationFrame(render);
}

buildOSK();
buildGrid(); 
bindSprings(''); 
requestAnimationFrame(render);</script></body></html>
